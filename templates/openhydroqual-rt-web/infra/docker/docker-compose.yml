version: "3.9"
services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../../:/app
    command: bash -lc "pip install -r apps/api/requirements.txt && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../../:/app
    command: bash -lc "pip install -r apps/worker/requirements.txt && celery -A apps.worker.tasks worker --loglevel=info"
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ohq
      POSTGRES_PASSWORD: ohq
      POSTGRES_DB: ohq_rt
    ports:
      - "5432:5432"
